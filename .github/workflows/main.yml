name: CI

# Pipeline d'integration continue du simulateur de trafic multi-agents (C++/CMake).
#   Job 1 (tests)    : compile simcore + la suite GoogleTest, lance ctest.        (Linux)
#   Job 2 (build)    : compile l'executable GUI standalone (.exe) et le publie
#                      en artifact ; sur un tag v* -> Release GitHub.             (Windows)
#   Job 3 (metrics)  : couverture de tests (gcovr) + benchmark de performance,
#                      resume dans le GitHub Step Summary du build.               (Linux)
#
# Note d'architecture (rapport de recherche) : le job 'report' ci-dessous est un
# squelette desactive. Une fois des notebooks ajoutes dans analysis/, il les
# executera (papermill/nbconvert), generera les plots et publiera un rapport
# stylise sur GitHub Pages. La structure du depot (analysis/, simbench headless,
# export CSV des metriques) est deja prete pour ce branchement.

on:
  push:
    branches: [ main ]
    tags:     [ 'v*' ]
  pull_request:
    branches: [ main ]

# Annule les runs obsoletes sur une meme ref (push successifs).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ===========================================================================
  # JOB 1 : Tests unitaires (GoogleTest + ctest)
  # ===========================================================================
  tests:
    name: Unit tests (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install SFML + build tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build libsfml-dev

      # GUI desactivee (-DTRAFFIC_BUILD_APP=OFF) : les tests n'ont besoin que de
      # simcore + simtests, on evite ImGui/OpenGL sur le runner.
      - name: Configure
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DTRAFFIC_BUILD_APP=OFF
          -DTRAFFIC_BUILD_TESTS=ON

      - name: Build (simcore + simtests + simbench)
        run: cmake --build build --parallel

      - name: Run tests
        run: ctest --test-dir build --output-on-failure

  # ===========================================================================
  # JOB 2 : Executable standalone Windows (.exe) -> artifact / release
  # ===========================================================================
  build-windows:
    name: Standalone .exe (Windows)
    runs-on: windows-latest
    permissions:
      contents: write   # requis pour publier la Release sur un tag v*
    steps:
      - uses: actions/checkout@v4

      # SFML officiel 2.6.x (binaires MSVC vc17 64-bit). On NE PASSE PAS par
      # vcpkg : il fournit desormais SFML 3.0 (API differente, et ImGui-SFML v2.5
      # exige SFML 2.x). On pointe SFML_DIR sur l'archive officielle 2.6.1.
      - name: Download SFML 2.6.1 (MSVC vc17, 64-bit)
        shell: pwsh
        run: |
          $url = "https://www.sfml-dev.org/files/SFML-2.6.1-windows-vc17-64-bit.zip"
          Invoke-WebRequest -Uri $url -OutFile sfml.zip
          Expand-Archive -Path sfml.zip -DestinationPath C:\SFML -Force

      - name: Configure
        shell: pwsh
        run: >
          cmake -S . -B build
          -DSFML_DIR="C:/SFML/SFML-2.6.1/lib/cmake/SFML"
          -DTRAFFIC_BUILD_APP=ON
          -DTRAFFIC_BUILD_TESTS=OFF

      - name: Build (Release)
        run: cmake --build build --config Release --parallel

      # Le post-build CMake copie deja assets/ a cote du .exe. On y ajoute les
      # DLL SFML (release) puis on empaquette tout le dossier de sortie.
      - name: Package
        shell: pwsh
        run: |
          $out = "build/Release"
          if (-not (Test-Path "$out/TrafficSimulation.exe")) {
            Write-Error "Executable introuvable dans $out"; exit 1
          }
          $bin = "C:/SFML/SFML-2.6.1/bin"
          Copy-Item "$bin/sfml-graphics-2.dll","$bin/sfml-window-2.dll","$bin/sfml-system-2.dll" -Destination $out
          # Dossier de livraison (.exe + DLL + assets) = contenu final.
          New-Item -ItemType Directory -Force dist/TrafficSimulation | Out-Null
          Copy-Item "$out/*" -Destination dist/TrafficSimulation -Recurse -Force
          # Le ZIP ne sert QU'A l'attachement de Release. L'artifact, lui, recoit
          # le DOSSIER (upload-artifact le zippe une seule fois) -> plus de
          # zip-dans-zip.
          Compress-Archive -Path "dist/TrafficSimulation/*" -DestinationPath "dist/TrafficSimulation-windows-x64.zip" -Force

      - name: Upload artifact (dossier -> un seul zip, pas de double archive)
        uses: actions/upload-artifact@v4
        with:
          name: TrafficSimulation-windows-x64
          path: dist/TrafficSimulation
          if-no-files-found: error

      # Push sur main : (re)publie une release "nightly" toujours a jour, visible
      # sur la page Releases du depot -> le .exe est telechargeable directement.
      - name: Publish nightly release (push main)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: "Nightly (dernier build de main)"
          prerelease: true
          files: dist/TrafficSimulation-windows-x64.zip

      # Tag v* : release versionnee classique.
      - name: Publish tagged release (tag v*)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/TrafficSimulation-windows-x64.zip

  # ===========================================================================
  # JOB 3 : Couverture de tests + metriques de performance -> Step Summary
  # ===========================================================================
  metrics:
    name: Coverage + performance (Linux)
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - uses: actions/checkout@v4

      - name: Install SFML + gcovr
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build libsfml-dev gcovr

      - name: Configure (coverage)
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Debug
          -DTRAFFIC_BUILD_APP=OFF
          -DTRAFFIC_BUILD_TESTS=ON
          -DTRAFFIC_COVERAGE=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Run tests (collect coverage)
        run: ctest --test-dir build --output-on-failure

      - name: Coverage report (gcovr)
        run: |
          gcovr --root . build --filter 'src/' \
                --xml-pretty -o build/coverage.xml \
                --html-details build/coverage.html \
                --print-summary | tee build/coverage.txt

      - name: Performance benchmark
        run: ./build/simbench 12 1 | tee build/bench.txt

      - name: Write Step Summary
        run: |
          {
            echo "## TrafficSimulation — metrics"
            echo ""
            echo "### Test coverage (src/)"
            echo '```'
            grep -E 'lines:|functions:|branches:' build/coverage.txt || cat build/coverage.txt
            echo '```'
            echo ""
            echo "### Engine performance (headless benchmark)"
            echo '```'
            grep '^BENCH ' build/bench.txt
            echo '```'
            speed=$(grep '^BENCH speedup_x_realtime=' build/bench.txt | cut -d= -f2)
            echo ""
            echo "**Moteur : ${speed}x temps reel** (secondes simulees / seconde de calcul)."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage HTML
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: build/coverage.html
          if-no-files-found: warn

  # ===========================================================================
  # JOB 4 (SQUELETTE, desactive) : rapport de recherche -> GitHub Pages
  # ===========================================================================
  # Active ce job quand des notebooks existent dans analysis/. Il executera les
  # notebooks (plots a partir des CSV exportes par simbench / MetricsCollector)
  # et publiera un rapport HTML sur GitHub Pages.
